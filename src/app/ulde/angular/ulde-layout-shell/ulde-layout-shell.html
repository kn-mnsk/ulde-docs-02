<!-- <p>ulde-layout-shell works!</p> -->
<div class="layout">
  <aside class="sidebar" id="sidebarBox" #sidebar>
    <div class="resizer" id="sidebarResizer" #sidebarResizer></div>
    <h2>Docs</h2>
    <nav>
      <a routerLink="/home">Home</a>
      <a routerLink="/getting-started">Getting Started</a>
    </nav>
  </aside>

  <main class="content">
    <header class="header">
      <h1>ULDE Documentation</h1>
    </header>

    @if ($loading()) {
    <div class="ulde-viewer__loading">
      Loading…
    </div>
    } @else {

    @if ($error()) {
    <div class="ulde-viewer__error">
      {{ $error() }}
    </div>
    } @else {

    @if ($contentResult()) {
    <article class="doc-body" [innerHTML]="$html()"></article>
    <app-ulde-debug-overlay />
    }
    }
    }
  </main>
</div>
