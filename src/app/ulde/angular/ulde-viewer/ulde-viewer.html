<!-- <p>app-ulde-viewer works</p> -->

<div>

  @if ($loading()) {
  <div class="ulde-viewer__loading">
    Loading…
  </div>
  } @else {

  @if ($error()) {
  <div class="ulde-viewer__error">
    {{ $error() }}
  </div>
  } @else {

  @if ($rendered()) {
  <div id="ulde_viewer_root" #ulde_viewer_root class="ulde-viewer__content" [innerHTML]="sanitizedContent"></div>
  <app-ulde-debug-overlay />
  }

  }

  }

</div>
