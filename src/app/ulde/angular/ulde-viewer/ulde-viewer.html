<p>app-ulde-viewer works</p>

<div class="ulde-viewer" #uldeViewer>

  @if (loading()) {
    <div class="ulde-viewer__loading">
      Loading…
    </div>
  } @else {

    @if (error()) {
      <div class="ulde-viewer__error">
        {{ error() }}
      </div>
    } @else {

      @if (rendered()) {
        <p>content rendered</p>
        <div id="contentRoot"
          #contentRoot
          class="ulde-viewer__content"
          [innerHTML]="rendered()?.content"
        ></div>

        <app-ulde-debug-overlay />
      }

    }

  }

</div>
