<div class="scroll-progress-bar">
  <div class="scroll-progress-bar_fill" [style.width.%]="scrollService.scrollPercent()"></div>
</div>

<div class="ulde-layout">
  <div>
    <aside class="ulde-layout-sidebar" #uldeLayoutSidebar>
      <div class="ulde-layout-sidebar_resizer" #uldeLayoutSidebarResizer></div>
      <h2>Docs</h2>
      <nav>
        <a routerLink="/home">Home</a>
        <a routerLink="/getting-started">Getting Started</a>
      </nav>
    </aside>
  </div>

  <div>
    <main>
      <div class="ulde-layout-main" #uldeLayoutMain>
        <div class="ulde-layout-main_wrapper">
          <div class="ulde-layout-main_overlay hidden"></div>
          <article class="ulde-layout-main_content" #docBodyContent [innerHTML]="$html()"></article>
          <app-ulde-debug-overlay />
        </div>
      </div>
    </main>
  </div>
</div>
